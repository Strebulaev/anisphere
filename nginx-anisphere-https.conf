# ======================================================================
# nginx-anisphere-https.conf
# CORS обрабатывается ТОЛЬКО Django (corsheaders middleware).
# Nginx НЕ добавляет Access-Control-* заголовки — это исключает дубли.
# ======================================================================

# HTTP
server {
    server_name anisphere.ru www.anisphere.ru;
    listen 192.168.0.27:80 default_server;
    charset off;
    index index.html;
    disable_symlinks if_not_owner from=$root_path;
    include /etc/nginx/vhosts-includes/*.conf;
    include /etc/nginx/vhosts-resources/anisphere.ru/*.conf;
    access_log /var/www/httpd-logs/anisphere.ru.access.log;
    error_log /var/www/httpd-logs/anisphere.ru.error.log notice;
    set $root_path /var/www/www-root/data/www/anisphere.ru;
    root $root_path;

    location /static/ {
        alias /var/www/www-root/data/www/anisphere.ru/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/www-root/data/www/anisphere.ru/media/;
        expires 30d;
        access_log off;
    }

    location ~* ^/(video-editor|upload|clip) {
        try_files $uri /index.html;
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
    }

    # API — только проксируем, CORS отдаёт Django
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Authorization     $http_authorization;
        proxy_pass_header Authorization;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        # НЕ добавляем Access-Control-* — Django делает это сам через corsheaders
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /api/ws/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_pass_header Authorization;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        location ~* ^.+\.(jpg|jpeg|gif|png|svg|js|css|mp3|ogg|mpe?g|avi|zip|gz|bz2?|rar|swf|webp|woff|woff2)$ {
            expires 24h;
        }
    }

    include /etc/nginx/users-resources/www-root/*.conf;
    ssi on;
}

# HTTPS
server {
    server_name anisphere.ru www.anisphere.ru;
    listen 192.168.0.27:443 ssl default_server;

    ssl_certificate     "/var/www/httpd-cert/www-root/anisphere.ru_le1.crtca";
    ssl_certificate_key "/var/www/httpd-cert/www-root/anisphere.ru_le1.key";
    ssl_ciphers         EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_dhparam         /etc/ssl/certs/dhparam4096.pem;

    charset off;
    index index.html;
    disable_symlinks if_not_owner from=$root_path;
    include /etc/nginx/vhosts-includes/*.conf;
    include /etc/nginx/vhosts-resources/anisphere.ru/*.conf;
    access_log /var/www/httpd-logs/anisphere.ru.access.log;
    error_log /var/www/httpd-logs/anisphere.ru.error.log notice;
    set $root_path /var/www/www-root/data/www/anisphere.ru;
    root $root_path;

    location /static/ {
        alias /var/www/www-root/data/www/anisphere.ru/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/www-root/data/www/anisphere.ru/media/;
        expires 30d;
