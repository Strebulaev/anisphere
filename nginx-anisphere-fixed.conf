# ══════════════════════════════════════════════════════════════════
#  HTTP → HTTPS redirect (всё, включая www)
# ══════════════════════════════════════════════════════════════════
server {
    listen 192.168.0.27:80;
    server_name anisphere.org www.anisphere.org;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/www-root/data/www/anisphere.org;
    }

    location / {
        return 301 https://anisphere.org$request_uri;
    }
}

# ══════════════════════════════════════════════════════════════════
#  www → без www (HTTPS)
# ══════════════════════════════════════════════════════════════════
server {
    listen 192.168.0.27:443 ssl;
    http2 on;
    server_name www.anisphere.org;

    ssl_certificate     "/var/www/httpd-cert/www-root/anisphere.org_le2.crtca";
    ssl_certificate_key "/var/www/httpd-cert/www-root/anisphere.org_le2.key";
    ssl_ciphers EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://anisphere.org$request_uri;
}

# ══════════════════════════════════════════════════════════════════
#  Основной HTTPS сервер
# ══════════════════════════════════════════════════════════════════
server {
    listen 192.168.0.27:443 ssl;
    http2 on;
    server_name anisphere.org;

    ssl_certificate     "/var/www/httpd-cert/www-root/anisphere.org_le2.crtca";
    ssl_certificate_key "/var/www/httpd-cert/www-root/anisphere.org_le2.key";
    ssl_ciphers EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_dhparam /etc/ssl/certs/dhparam4096.pem;

    charset utf-8;
    index index.html;
    disable_symlinks if_not_owner from=$root_path;

    set $root_path /var/www/www-root/data/www/anisphere.org;
    root $root_path;

    access_log /var/www/httpd-logs/anisphere.org.access.log;
    error_log  /var/www/httpd-logs/anisphere.org.error.log notice;

    include /etc/nginx/vhosts-includes/*.conf;
    include /etc/nginx/vhosts-resources/anisphere.org/*.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Статика Django ─────────────────────────────────────────────
    location /static/ {
        alias /var/www/www-root/data/www/anisphere.org/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── Медиафайлы ────────────────────────────────────────────────
    location /media/ {
        alias /var/www/www-root/data/www/anisphere.org/media/;
        expires 30d;
        access_log off;
    }

    # ── ffmpeg.wasm (COOP/COEP для SharedArrayBuffer) ─────────────
    location ~* ^/(video-editor|upload|clip) {
        try_files $uri /index.html;
        add_header Cross-Origin-Opener-Policy  "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # ── phpMyAdmin ────────────────────────────────────────────────
    location /l2xyKSFik3LB6uaF/phpmyadmin {
        alias /var/www/www-root/data/www/anisphere.org/phpmyadmin;
        index index.php;
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

    # ── PHP в корне ───────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ── API → Django (CORS отдаёт сам Django, nginx не дублирует) ─
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header Origin            $http_origin;

        # Таймауты — важно для долгих Kodik-запросов
        proxy_connect_timeout  30s;
        proxy_send_timeout     60s;
        proxy_read_timeout     120s;

        # Буферизация
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── WebSocket (/ws/ и /api/ws/) ───────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /api/ws/ {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Django Admin ──────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
    }

    # ── SPA-роуты (Vue Router history mode) ───────────────────────
    location ^~ /anime/        { try_files $uri /index.html; }
    location ^~ /playlists/    { try_files $uri /index.html; }
    location ^~ /studios/      { try_files $uri /index.html; }
    location ^~ /reactor/      { try_files $uri /index.html; }
    location ^~ /social/       { try_files $uri /index.html; }
    location ^~ /users/        { try_files $uri /index.html; }
    location ^~ /notifications/{ try_files $uri /index.html; }
    location ^~ /profile/      { try_files $uri /index.html; }
    location ^~ /settings/     { try_files $uri /index.html; }
    location ^~ /subscription/ { try_files $uri /index.html; }
    location ^~ /watch/        { try_files $uri /index.html; }
    location ^~ /search/       { try_files $uri /index.html; }

    # ── Статические файлы фронтенда ───────────────────────────────
    location ~* \.(jpg|jpeg|gif|png|svg|webp|ico|css|js|woff|woff2|ttf|eot|mp3|ogg|mp4|zip|gz|br)$ {
        expires 24h;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    include /etc/nginx/users-resources/www-root/*.conf;
    ssi on;
}
