# HTTP server
server {
    server_name anisphere.ru www.anisphere.ru;
    listen 192.168.0.27:80 default_server;
    charset off;
    index index.html;
    disable_symlinks if_not_owner from=$root_path;
    include /etc/nginx/vhosts-includes/*.conf;
    include /etc/nginx/vhosts-resources/anisphere.ru/*.conf;
    access_log /var/www/httpd-logs/anisphere.ru.access.log;
    error_log /var/www/httpd-logs/anisphere.ru.error.log notice;
    set $root_path /var/www/www-root/data/www/anisphere.ru;
    root $root_path;

    # Static files
    location /static/ {
        alias /var/www/www-root/data/www/anisphere.ru/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Media files
    location /media/ {
        alias /var/www/www-root/data/www/anisphere.ru/media/;
        expires 30d;
        access_log off;
    }

    # ffmpeg.wasm pages
    location ~* ^/(video-editor|upload|clip) {
        try_files $uri /index.html;
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
    }

    # ========== ЯВНАЯ ОБРАБОТКА ВСЕХ СУЩЕСТВУЮЩИХ ДИРЕКТОРИЙ ==========
    location ^~ /anime/ {
        try_files $uri /index.html;
    }
    location ^~ /playlists/ {
        try_files $uri /index.html;
    }
    location ^~ /studios/ {
        try_files $uri /index.html;
    }
    location ^~ /reactor/ {
        try_files $uri /index.html;
    }
    location ^~ /social/ {
        try_files $uri /index.html;
    }
    location ^~ /users/ {
        try_files $uri /index.html;
    }
    location ^~ /notifications/ {
        try_files $uri /index.html;
    }
    location ^~ /config/ {
        try_files $uri /index.html;
    }
    location ^~ /core/ {
        try_files $uri /index.html;
    }
    location ^~ /dubs/ {
        try_files $uri /index.html;
    }

    location /l2xyKSFik3LB6uaF/phpmyadmin {
        alias /var/www/www-root/data/www/anisphere.ru/phpmyadmin;
        index index.php;
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_busy_buffers_size 64k;
            fastcgi_temp_file_write_size 64k;
            fastcgi_buffering on;
        }
    }

    # ========== ОБРАБОТКА PHP ФАЙЛОВ В КОРНЕ ==========
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_busy_buffers_size 64k;
        fastcgi_temp_file_write_size 64k;
        fastcgi_buffering on;
    }

    # ========== ОСНОВНОЙ SPA МАРШРУТИЗАТОР ==========
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========== СТАТИЧЕСКИЕ ФАЙЛЫ ==========
    location ~* \.(jpg|jpeg|gif|png|svg|webp|ico|css|js|mp3|ogg|mpe?g|avi|zip|gz|bz2?|rar|swf|woff|woff2|ttf|eot)$ {
        expires 24h;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ========== API И WEBSOCKETS (с CORS) ==========
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        
        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD" always;
        add_header Access-Control-Allow-Headers "Accept, Accept-Encoding, Authorization, Content-Type, DNT, Origin, User-Agent, X-CSRFToken, X-Requested-With, access-control-allow-origin" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Type" always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD";
            add_header Access-Control-Allow-Headers "Accept, Accept-Encoding, Authorization, Content-Type, DNT, Origin, User-Agent, X-CSRFToken, X-Requested-With, access-control-allow-origin";
            add_header Access-Control-Max-Age "86400";
            add_header Content-Type "text/plain charset=UTF-8";
            add_header Content-Length 0;
            return 204;
        }
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /api/ws/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    include /etc/nginx/users-resources/www-root/*.conf;
    ssi on;
}

# HTTPS server
server {
    server_name anisphere.ru www.anisphere.ru;
    listen 192.168.0.27:443 ssl;
    http2 on;
    ssl_certificate "/var/www/httpd-cert/www-root/anisphere.ru_le1.crtca";
    ssl_certificate_key "/var/www/httpd-cert/www-root/anisphere.ru_le1.key";
    ssl_ciphers EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_dhparam /etc/ssl/certs/dhparam4096.pem;
    charset off;
    index index.html;
    disable_symlinks if_not_owner from=$root_path;
