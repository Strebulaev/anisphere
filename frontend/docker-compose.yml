frontend:
  build:
    context: ./frontend
    dockerfile: Dockerfile
  ports:
    - "5173:5173"
  volumes:
    - ./frontend:/app
    - /app/node_modules
  environment:
    - VITE_API_URL=https://anisphere.org
    - HOST=0.0.0.0
    - PORT=5173
  depends_on:
    - backend
  # Добавьте healthcheck
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:5173"]
    interval: 30s
    timeout: 10s
    retries: 3